document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ba(0,0,0,.7),0 0 60px -26px rgba(107,214,236,.14)\">\n      <div style=\"display:flex;align-items:center;gap:8px;padding:12px 15px;background:#161E30;border-bottom:1px solid #263349\">\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#F7768E\"><\u002Fspan>\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#E8B45C\"><\u002Fspan>\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#7BD88F\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#6C7C9C;margin-left:8px\">— control-crosswalk · ISO 27001:2022 ↔ NIST CSF 2.0 ↔ NIS2<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr\" id=\"demogrid\">\n        <div style=\"border-right:1px solid #263349\" id=\"demoleft\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#6C7C9C;padding:13px 16px;border-bottom:1px solid #1C2740;display:flex;justify-content:space-between;align-items:center\"><span><span style=\"color:#E8B45C\">ISO/IEC 27001:2022<\u002Fspan> — Annex A<\u002Fspan><span>{{ implText }}<\u002Fspan><\u002Fdiv>\n          <div style=\"max-height:342px;overflow-y:auto;overflow-x:hidden\">{{ clistEl }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column\">\n          {{ covEl }}\n          {{ inspEl }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#45536E;padding:11px 16px;border-top:1px solid #263349;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px\">\n        <span>29 controls · 3 frameworks · curated subset of the full 93-control tool<\u002Fspan>\n        <a href=\"https://github.com/workmcg/control-crosswalk\" target=\"_blank\" rel=\"noopener\">view source on github ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TOOLKIT -->\n<section id=\"toolkit\" style=\"position:relative;z-index:1;padding:96px 26px;border-top:1px solid #131c2e\">\n  <div style=\"max-width:1120px;margin:0 auto\">\n    <div data-reveal=\"\" style=\"text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#6C7C9C;margin-bottom:.6rem\"><span style=\"color:#6BD6EC\">//<\u002Fspan> ls ./toolkit/<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(1.7rem,3.6vw,2.4rem);color:#EDF3FC;letter-spacing:-.02em\">The GRC automation toolkit<\u002Fh2>\n      <p style=\"color:#8A99B8;margin:.6rem auto 0;font-size:1.04rem;text-wrap:pretty\">control-crosswalk started it. Six open-source tools that turn manual GRC work — mapping, gap analysis, risk scoring, readiness, incident response — into something that runs itself.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:40px\" id=\"toolgrid\">\n\n      <a href=\"https://github.com/workmcg/control-crosswalk\" target=\"_blank\" rel=\"noopener\" data-reveal=\"\" data-tilt=\"\" style=\"display:block;background:#111725;border:1px solid #263349;border-radius:14px;padding:24px;transition:transform .25s,border-color .25s,box-shadow .25s\" style-hover=\"transform:translateY(-4px);border-color:#33455f;box-shadow:0 24px 50px -30px rgba(0,0,0,.7),0 0 40px -22px rgba(107,214,236,.35)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#6BD6EC;letter-spacing:.04em\">// grc · cli · zero-dep<\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#7BD88F;border:1px solid rgba(123,216,143,.3);background:rgba(123,216,143,.1);padding:.2em .55em;border-radius:5px\">flagship<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.28rem;color:#EDF3FC;margin:.8rem 0 );padding:.2em .55em;border-radius:5px\">live demo ↗<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.28rem;color:#EDF3FC;margin:.8rem 0 .4rem\">risk-register-ai<\u002Fh3>\n        <p style=\"font-size:.94rem;color:#8A99B8;margin-bottom:1rem;line-height:1.55\">Turns raw audit findings into a scored, framework-mapped risk register — asset, threat, vulnerability, <b style=\"color:#C4D0E4;font-weight:600\">5×5 inherent &amp; residual scoring<\u002Fb>, ISO 31000 treatment decisions and owners. Deterministic maths, LLM only for the inputs. CSV export.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">Streamlit<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">GPT-4o<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">ISO 31000<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"https://github.com/workmcg/nis2-readiness-checker\" target=\"_blank\" rel=\"noopener\" data-reveal=\"\" data-delay=\"60\" data-tilt=\"\" style=\"display:block;background:#111725;border:1px solid #263349;border-radius:14px;padding:24px;transition:transform .25s,border-color .25s,box-shadow .25s\" style-hover=\"transform:translateY(-4px);border-color:#33455f;box-shadow:0 24px 50px -30px rgba(0,0,0,.7),0 0 40px -22px rgba(123,216,143,.32)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#7BD88F;letter-spacing:.04em\">// grc · cli · zero-dep<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.28rem;color:#EDF3FC;margin:.8rem 0 .4rem\">nis2-readiness-checker<\u002Fh3>\n        <p style=\"font-size:.94rem;color:#8A99B8;margin-bottom:1rem;line-height:1.55\">Scores an organisation's <b style=\"color:#C4D0E4;font-weight:600\">NIS2 readiness<\u002Fb> across 12 domains mapped to Articles 20, 21(2) and 23 — weighted yes/partial/no scoring, readiness bands, and a prioritised remediation backlog in Markdown, JSON or CSV.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">Python<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">NIS2<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">backlog export<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"https://github.com/workmcg/ir-playbook-gen\" target=\"_blank\" rel=\"noopener\" data-reveal=\"\" data-tilt=\"\" style=\"display:block;background:#111725;border:1px solid #263349;border-radius:14px;padding:24px;transition:transform .25s,border-color .25s,box-shadow .25s\" style-hover=\"transform:translateY(-4px);border-color:#33455f;box-shadow:0 24px 50px -30px rgba(0,0,0,.7),0 0 40px -22px rgba(247,118,142,.32)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#F7768E;letter-spacing:.04em\">// grc · incident response<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.28rem;color:#EDF3FC;margin:.8rem 0 .4rem\">ir-playbook-gen<\u002Fh3>\n        <p style=\"font-size:.94rem;color:#8A99B8;margin-bottom:1rem;line-height:1.55\">Incident type + sector + framework → a <b style=\"color:#C4D0E4;font-weight:600\">complete IR playbook in under 60 seconds<\u002Fb>: containment steps, volatile-first forensic checklists, RACI roles, comms templates and regulatory notification timelines. 10 built-in incident types.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">Python<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">GPT-4o<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#6C7C9C;border:1px solid #1C2740;padding:.24em .55em;border-radius:5px\">RACI · comms<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"https://github.com/workmcg/attack-navigator\" target=\"_blank\" rel=\"noopener\" data-reveal=\"\" data-delay=\"60\" data-tilt=\"\" style=\"display:block;background:#111725;border:1px solid #263349;border-radius:14px;padding:24px;transition:transform .25s,border-color .25s,box-shadow .25s\" style-hover=\"transform:translateY(-4px);border-color:#33455f;box-shadow:0 24px 50px -30px rgba(0,0,0,.7),0 0 40px -22px rgba(122,162,247,.32)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#7AA2F7;letter-spacing:.04em\">// threat modelling<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.28rem;color:#EDF3FC;margin:.8rem 0 .4rem\">attack-navigator<\u002Fh3>\n        <p style=\"font-size:.94rem;color:#8A99B8;margin-bottom:1rem;line-height:1.55\">Navigation and annotation of <b style=\"color:#C4 color:'+C.cyan+'\">help<\u002Fspan> <span style=\"color:'+C.dim+'\">to start over<\u002Fspan><\u002Fspan>'); return; }\n    if(this.responses[cmd]) this.push(this.responses[cmd]);\n    else if(this.scrollMap[cmd]) this.push('<span style=\"color:'+C.text+'\"><span style=\"color:'+C.green+'\">→<\u002Fspan> opening <span style=\"color:'+C.cyan+'\">'+cmd+'<\u002Fspan>…<\u002Fspan>');\n    else this.push('<span style=\"color:'+C.text+'\"><span style=\"color:'+C.coral+'\">command not found<\u002Fspan>: '+cmd+' <span style=\"color:'+C.dim+'\">— type<\u002Fspan> <span style=\"color:'+C.cyan+'\">help<\u002Fspan><\u002Fspan>');\n    if(this.scrollMap[cmd]){ const t=document.querySelector(this.scrollMap[cmd]); if(t) this._t=setTimeout(()=>{ const y=t.getBoundingClientRect().top+window.pageYOffset-60; window.scrollTo({top:y,behavior:this.reduce?'auto':'smooth'}); },300); }\n  }\n\n  /* ---------- commit toggles ---------- */\n  toggleCommit = (e) => {\n    const commit = e.currentTarget.closest('[style*=\"padding-bottom:30px\"], [style*=\"position:relative\"]');\n    // find nearest ancestor holding a data-detail child\n    let node = e.currentTarget;\n    let wrap = null;\n    while(node && node.parentElement){ node=node.parentElement; if(node.querySelector && node.querySelector(':scope > [data-detail]')){ wrap=node; break; } }\n    if(!wrap) return;\n    const detail = wrap.querySelector(':scope > [data-detail]');\n    const arrow = wrap.querySelector('[data-arrow]');\n    const open = detail.style.maxHeight && detail.style.maxHeight!=='0px';\n    if(open){ detail.style.maxHeight='0px'; if(arrow) arrow.style.transform='rotate(0deg)'; }\n    else { detail.style.maxHeight='400px'; if(arrow) arrow.style.transform='rotate(90deg)'; }\n  };\n\n  /* ---------- crosswalk ---------- */\n  toggleImpl(idx){ const impl={...this.state.impl}; impl[idx]=!impl[idx]; this.setState({impl}); }\n  inspect(idx){ this.setState({sel:idx}); }\n\n  /* ---------- reveal + scroll + network ---------- */\n  setupReveal(){\n    const els=document.querySelectorAll('[data-reveal]');\n    if(this.reduce || !('IntersectionObserver' in window)) return;\n    els.forEach(el=>{ el.style.opacity='0'; el.style.transform='translateY(24px)'; el.style.transition='opacity .75s cubic-bezier(.2,.7,.2,1), transform .75s cubic-bezier(.2,.7,.2,1)'; const d=el.getAttribute('data-delay'); if(d) el.style.transitionDelay=d+'ms'; });\n    const io=new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='none'; io.unobserve(e.target); } }); },{threshold:.12,rootMargin:'0px 0px -40px 0px'});\n    els.forEach(el=>io.observe(el));\n    // count-up\n    const counts=document.querySelectorAll('[data-count]');\n    const cio=new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting){ this.countUp(e.target); cio.unobserve(e.target); } }); },{threshold:.5});\n    counts.forEach(el=>cio.observe(el));\n  }\n  countUp(el){\n    const target=parseInt(el.getAttribute('data-count'),10)||0;\n    const dur=1000; const start=performance.now();\n    const tick=(now)=>{ const p=Math.min(1,(now-start)/dur); const e=1-Math.pow(1-p,3); el.textContent=Math.round(e*target); if(p<1) requestAnimationFrame(tick); };\n    requestAnimationFrame(tick);\n  }\n  setupScroll(){\n    const bar=document.getElementById('scrollbar');\n    this._onScroll=()=>{\n      const h=document.documentElement.scrollHeight-window.innerHeight;\n      const p=h>0?(window.pageYOffset/h)*100:0;\n      if(bar) bar.style.width=p+'%';\n      if(!this.reduce && this._canvas){ this._scrollY=window.pageYOffset; }\n    };\n    window.addEventListener('scroll',this._onScroll,{passive:true});\n    this._onScroll();\n  }\n  setupNetwork(){\n    const cv=document.getElementById('netcanvas'); if(!cv) return;\n    this._canvas=cv; const ctx=cv.getContext('2d');\n    let W,H,dpr; const density=this.props.networkDensity||46;\n    const nodes=[];\n    const resize=()=>{ dpr=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth; H=cv.clientHeight; cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };\n    resize(); window.addEventListener('resize',resize,{passive:true});\n    for(let i=0;i<density;i++){ nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22}); }\n    const draw=()=>{\n      ctx.clearRect(0,0,W,H);\n      for(const n of nodes){ n.x+=n.vx; n.y+=n.vy; if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1; }\n      for(let i=0;i<nodes.length;i++){\n        for(let j=i+1;j<nodes.length;j++){\n          const a=nodes[i],b=nodes[j]; const dx=a.x-b.x,dy=a.y-b.y; const d=Math.sqrt(dx*dx+dy*dy);\n          if(d<128){ const o=(1-d/128)*.32; ctx.strokeStyle='rgba(107,214,236,'+o+')'; ctx.lineWidth=.7; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }\n        }\n      }\n      for(const n of nodes){ ctx.fillStyle='rgba(155,230,245,.55)'; ctx.beginPath(); ctx.arc(n.x,n.y,1.5,0,6.283); ctx.fill(); }\n      this._raf=requestAnimationFrame(draw);\n    };\n    draw();\n  }\n\n  /* ---------- crosswalk render helpers ---------- */\n  recompute(){\n    const total=this.CTRLS.length;\n    const impl=Object.keys(this.state.impl).filter(k=>this.state.impl[k]).length;\n    const pct=total?Math.round(impl/total*100):0;\n    const present={},open={};\n    this.CTRLS.forEach((c,idx)=>{ (c.nis2||[]).forEach(m=>{ present[m]=true; if(!this.state.impl[idx]) open[m]=true; }); });\n    return { pct, impl, totalM:Object.keys(present).length, openM:Object.keys(open).length };\n  }\n\n  renderVals(){\n    const e=React.createElement;\n    // terminal body\n    const termBody=e('div',{}, this.state.term.map((h,i)=>e('div',{key:i,style:{whiteSpace:'pre-wrap',wordBreak:'break-word'},dangerouslySetInnerHTML:{__html:h}})));\n\n    // crosswalk\n    const {pct,impl,totalM,openM}=this.recompute();\n    const clistEl=e('div',{}, this.CTRLS.map((c,idx)=>{\n      const on=!!this.stat :{fontFamily:'JetBrains Mono, monospace',fontSize:'.8rem',color:'#45536E',padding:'14px 0'}}, e('span',{style:{color:'#6BD6EC'}},'← '), 'select a control to inspect its mapping'));\n    } else {\n      const c=this.CTRLS[this.state.sel];\n      const badge=(txt,color,bg,bd)=>e('span',{key:txt,style:{fontFamily:'JetBrains Mono, monospace',fontSize:'.72rem',padding:'.3em .6em',borderRadius:'6px',color,background:bg,border:'1px solid '+bd,animation:'pop .3s ease backwards'}},txt);\n      inspEl=e('div',{style:{padding:'16px',flex:1}},\n        e('h4',{style:{fontFamily:'JetBrains Mono, monospace',fontSize:'.78rem',color:'#E8B45C',marginBottom:'.2rem'}}, c.id),\n        e('div',{style:{fontSize:'.98rem',color:'#EDF3FC',marginBottom:'.3rem',fontWeight:500}}, c.n),\n        e('span',{style:{display:'inline-block',fontFamily:'JetBrains Mono, monospace',fontSize:'.68rem',color:'#6C7C9C',border:'1px solid #263349',padding:'.15em .5em',borderRadius:'5px',marginBottom:'1rem'}}, c.t),\n        e('div',{style:{marginBottom:'1rem'}},\n          e('div',{style:{fontFamily:'JetBrains Mono, monospace',fontSize:'.7rem',color:'#6C7C9C',marginBottom:'.45rem'}}, e('span',{style:{color:'#6BD6EC'}},'→ '),'NIST CSF 2.0'),\n          e('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}}, (c.csf&&c.csf.length)?c.csf.map(x=>badge(x,'#7AA2F7','rgba(122,162,247,.12)','rgba(122,162,247,.3)')):e('span',{style:{fontFamily:'JetBrains Mono, monospace',color:'#45536E'}},'—'))\n        ),\n        e('div',{},\n          e('div',{style:{fontFamily:'JetBrains Mono, monospace',fontSize:'.7rem',color:'#6C7C9C',marginBottom:'.45rem'}}, e('span',{style:{color:'#6BD6EC'}},'→ '),'NIS2 Article 21'),\n          e('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}}, (c.nis2||[]).map(x=>badge(x,'#BB9AF7','rgba(187,154,247,.12)','rgba(187,154,247,.3)'))),\n          e('div',{style:{fontSize:'.84rem',color:'#8A99B8',marginTop:'.6rem',lineHeight:1.5,borderLeft:'2px solid #263349',paddingLeft:'.7rem'}}, (c.nis2||[]).map(x=>this.NIS2[x]).join(' · '))\n        )\n      );\n    }\n\n    return {\n      termBody,\n      cmd:this.state.cmd,\n      onInput:(ev)=>this.setState({cmd:ev.target.value}),\n      onKey:(ev)=>{ if(ev.key==='Enter'){ this.runCmd(ev.target.value); this.setState({cmd:''}); } },\n      onChip:(ev)=>this.runCmd(ev.currentTarget.dataset.cmd),\n      toggleCommit:this.toggleCommit,\n      year:new Date().getFullYear(),\n      implText:impl+' implemented',\n      clistEl, covEl, inspEl\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
